apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel-api
  labels:
    app: admin-panel-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-panel-api
  template:
    metadata:
      labels:
        app: admin-panel-api
    spec:
      containers:
        - name: admin-panel-api
          image: harbor.kigawa.net/library/admin-panel-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            # 実機器名・IPアドレスを含むトポロジーはこのリポジトリにはコミットしない。
            # クラスタ側で `kubectl create secret generic admin-panel-network-topology
            # --from-literal=NETWORK_TOPOLOGY_JSON=...` として別途投入する。未作成でも
            # optional のため起動は失敗せず、サーバー側の汎用フォールバックが使われる。
            - secretRef:
                name: admin-panel-network-topology
                optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
