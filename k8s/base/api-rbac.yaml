apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-panel-api
---
# admin-panel-api がノード一覧・状態(名前・内部IP・ロール・Ready状態・Pod数)を
# Kubernetes APIから直接取得しネットワークマップ/サーバー管理画面を描画するために
# 必要な、読み取り専用・クラスタスコープの権限。書き込み系の verb は一切含まない。
# nodes/pods は namespace を持たない/全namespace横断のため ClusterRole/ClusterRoleBinding
# が必要。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: admin-panel-api-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-panel-api-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin-panel-api-node-reader
subjects:
  - kind: ServiceAccount
    name: admin-panel-api
    namespace: kigawa-net-admin-panel
---
# サーバー管理画面のCordon/Uncordon/Drain/Pod再起動機能に必要な、書き込み系の権限。
# 読み取り専用の admin-panel-api-node-reader とは別ロールに分離し、必要な操作範囲を
# 明示的に絞る(nodesのdelete/create、他リソースへの権限は含まない)。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: admin-panel-api-node-operator
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-panel-api-node-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin-panel-api-node-operator
subjects:
  - kind: ServiceAccount
    name: admin-panel-api
    namespace: kigawa-net-admin-panel
