apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-panel
spec:
  ingressClassName: haproxy
  rules:
    - host: admin.kigawa.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: admin-panel-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
