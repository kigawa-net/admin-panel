server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    large_client_header_buffers 4 32k;
    client_header_buffer_size 8k;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types application/wasm application/javascript text/css;
}
