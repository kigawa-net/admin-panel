apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel-api
  labels:
    app: admin-panel-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-panel-api
  template:
    metadata:
      labels:
        app: admin-panel-api
    spec:
      serviceAccountName: admin-panel-api
      containers:
        - name: admin-panel-api
          image: harbor.kigawa.net/library/admin-panel-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # 管理用realm(全機能)とpublic用realm(閲覧専用)を独立に検証するためのuserinfo
            # エンドポイント。public用realmはKeycloak側で別途作成が必要(未作成の間、
            # public用realmのトークンは常に無効と判定されるだけで、管理用realmの動作には
            # 影響しない)。
            - name: KEYCLOAK_ADMIN_USERINFO_URL
              value: "https://user.kigawa.net/realms/manage/protocol/openid-connect/userinfo"
            - name: KEYCLOAK_PUBLIC_USERINFO_URL
              value: "https://user.kigawa.net/realms/kigawa-net/protocol/openid-connect/userinfo"
            # kigawa-net GitHub App (app_id 4316503) を操作してインストールトークンを
            # 発行するための鍵。admin-panel-github-app シークレットは事前に別途作成が必要
            # (kinfra/Bitwarden経由、またはkubectl create secretで private-key キーを投入)。
            - name: GITHUB_APP_ID
              value: "4316503"
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: admin-panel-github-app
                  key: private-key
                  optional: true
            # CI(カスタムアクション経由)がGitHub Appの秘密鍵を直接扱わずに済むよう、
            # ここで発行を仲介するための共有シークレット。GitHub Actions側では
            # 同じ値を ADMIN_PANEL_CI_TOKEN として登録する(kigawa-net/kinfra#348)。
            - name: GITHUB_APP_CI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: admin-panel-github-app
                  key: ci-token
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
