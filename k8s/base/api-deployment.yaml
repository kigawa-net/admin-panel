apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel-api
  labels:
    app: admin-panel-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-panel-api
  template:
    metadata:
      labels:
        app: admin-panel-api
    spec:
      serviceAccountName: admin-panel-api
      containers:
        - name: admin-panel-api
          image: harbor.kigawa.net/library/admin-panel-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # 管理用realm(全機能)とpublic用realm(閲覧専用)を独立に検証するためのuserinfo
            # エンドポイント。public用realmはKeycloak側で別途作成が必要(未作成の間、
            # public用realmのトークンは常に無効と判定されるだけで、管理用realmの動作には
            # 影響しない)。
            - name: KEYCLOAK_ADMIN_USERINFO_URL
              value: "https://user.kigawa.net/realms/manage/protocol/openid-connect/userinfo"
            - name: KEYCLOAK_PUBLIC_USERINFO_URL
              value: "https://user.kigawa.net/realms/kigawa-net/protocol/openid-connect/userinfo"
            # ユーザー管理機能(一覧・作成・削除・有効/無効・パスワードリセット)が使う、
            # Keycloak Admin REST API専用のサービスアカウント(client_credentials)。manage
            # realm側にservice account有効なconfidential clientを作成し、realm-management
            # クライアントのmanage-usersロールを付与した上で、Secret
            # admin-panel-keycloak-service-account に clientId/clientSecret を投入する
            # 必要がある(Keycloak側の設定はこのリポジトリの範囲外)。未設定の間はユーザー
            # 管理系エンドポイントが503を返すのみで、他機能には影響しない。
            - name: KEYCLOAK_ADMIN_API_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: admin-panel-keycloak-service-account
                  key: clientId
                  optional: true
            - name: KEYCLOAK_ADMIN_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: admin-panel-keycloak-service-account
                  key: clientSecret
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
