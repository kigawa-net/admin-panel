name: Build and Push to Harbor

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/overlays/production/kustomization.yaml'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 同一リポジトリへのcheckout+pushのみが目的で、他リポジトリへのアクセスは不要なため、
      # 標準のGITHUB_TOKEN(contents: write権限を付与済み)を使う。GitHub Appのインストール
      # トークンは、複数リポジトリ共有の長期PATを置き換えるためのものであり、この用途には
      # 元々不要だった。admin-panel-api自体がまだ/api/github-app/ci-tokenエンドポイントを
      # 提供していない状態でこのステップが動くと、そのエンドポイントを持つ新しいイメージを
      # ビルドするために新しいイメージ自身が必要になる循環依存が生じるため、この経路では
      # App認証を使わない。
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.2'

      - name: Export kobweb site
        working-directory: site
        run: gradle kobwebExport -PkobwebExportLayout=STATIC --no-daemon

      - name: Copy kobweb output for Docker
        run: cp -r site/.kobweb/site dist

      - name: Build server distribution
        run: gradle :server:installDist --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.kigawa.net
          username: robot$kigawa-net
          password: ${{ secrets.HARBOR_PASS }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            harbor.kigawa.net/library/admin-panel:latest
            harbor.kigawa.net/library/admin-panel:main-${{ github.sha }}
          cache-from: type=registry,ref=harbor.kigawa.net/library/admin-panel:buildcache
          cache-to: type=registry,ref=harbor.kigawa.net/library/admin-panel:buildcache,mode=max

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            harbor.kigawa.net/library/admin-panel-api:latest
            harbor.kigawa.net/library/admin-panel-api:main-${{ github.sha }}
          cache-from: type=registry,ref=harbor.kigawa.net/library/admin-panel-api:buildcache
          cache-to: type=registry,ref=harbor.kigawa.net/library/admin-panel-api:buildcache,mode=max

      - name: Update manifest image tag
        run: |
          cd k8s/overlays/production
          sed -i 's|newTag:.*|newTag: main-${{ github.sha }}|' kustomization.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/kustomization.yaml
          git commit -m "chore: update admin-panel image tag to main-${{ github.sha }}"
          git push
